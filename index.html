<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Focus</title>
    <link rel="stylesheet" href="/node_modules/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <nav class="navigation">
        <img src="/images/midnight.png" class ="logo">
        <h3>Midnight <br> <span style="color: rgb(137, 36, 232);">Focus</span></h3>
        <div class="nav-button">
            <span class ="bi bi-house-door"> Dashboard</span>
            <span class ="bi bi-stopwatch"> Timer</span>
            <span class = "bi bi-list-task"> Task</span>
            <span class = "bi bi-bar-chart-line"> Statistic</span>
            <span class = "bi bi-emoji-smile"> Mood</span>
            <span class = "bi bi-gear"> Setting</span>
        </div>
        <div class="quote">“Winning isn’t <br> everything,but wanting <br> to  win is.”</div>
        <div class="social-icon"><span class="bi bi-github"></span>
            <span class="bi bi-twitter"></span>
            <span class="bi bi-instagram"></span>
        </div>

    </nav>
    <!-- This is my greeting section  -->
    <section class="greeting">

        <div class="name">
            <h2>Good Evening, <span style="color:rgb(137, 36, 232);">Amisha!</span>🌙</h2>
            <p class = "paragraph">Let's make today productive and amazing!✨</p>
        </div>

        <div class = "clock">
                <span class = "bi bi-clock time"> 8:45:30 PM</span>
                <span class = "date">Monday, 15 september 2026</span>
        </div>
        <span class = "bi bi-sun sun"></span>
    </section>
    <!-- this is my pomodoro timer -->
     <section class ="pomodoro">
        <h2 class="timer"><span class = "bi bi-clock" style="color:rgb(137, 36, 232);"></span> Pomodoro Timer</h2>
        <div class="break">
            <span class ="active">Focus</span>
            <span>Short break</span>
            <span>Long break</span>
        </div>

        <div class="focus_time">
            <span class="time" style="color: black;">22:10</span>
            <span class="focus">Focus Time</span>
        </div>


     </section>
</body>
</html>
